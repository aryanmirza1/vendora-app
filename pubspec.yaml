name: vendora
description: A multi-vendor e-commerce mobile app built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  flutter_rating_bar: ^4.0.1
  provider: ^6.1.2
  file_picker: ^10.3.7
  fl_chart: ^1.1.1  # Use this specific stable version
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  vector_math: ^2.1.4 # Standard versioning

flutter:
  uses-material-design: true
  assets:
    - assets/images/